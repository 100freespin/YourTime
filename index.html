<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    
        <meta property="og:type" content="website">
    <meta property="og:url" content="https://100freespin.github.io/YourTime/">
    <meta property="og:image" content="https://i.ibb.co.com/j9kGXcG4/20260329-013921.jpg">
    <meta property="og:image:secure_url" content="https://i.ibb.co.com/j9kGXcG4/20260329-013921.jpg">
    <meta property="og:image:width" content="1200">
    <meta property="og:image:height" content="630">
    
    <title>100 Free Spin</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800;900&display=swap" rel="stylesheet">
    
    <!-- Canvas Confetti -->
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

    <style>
        :root {
            --bg-dark: #090B10;
            --wheel-border: #1F2433;
            --accent: #00E5FF;
            
            /* Slice Colors */
            --slice-1: #FF2E63;
            --slice-2: #00D2FC;
            --slice-3: #FFD700;
            --slice-4: #2A2F40;
            --slice-5: #9D00FF;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background-color: var(--bg-dark);
            background-image: 
                radial-gradient(circle at 50% 0%, #1a1e2d 0%, transparent 70%),
                radial-gradient(rgba(255, 255, 255, 0.05) 1px, transparent 1px);
            background-size: 100% 100%, 20px 20px;
            color: #ffffff;
            overflow: hidden;
            -webkit-font-smoothing: antialiased;
        }

        .app-wrapper {
            position: relative; width: 100%; max-width: 400px; min-height: 100vh;
            margin: 0 auto; display: flex; flex-direction: column; align-items: center;
            justify-content: center; padding: 24px;
        }

        /* ----- WHEEL DESIGN (12-Second Realistic Spin) ----- */
        .wheel-container {
            position: relative; width: 100%; max-width: 330px; aspect-ratio: 1/1;
            margin: 30px auto 40px auto; border-radius: 50%; padding: 12px;
            background: linear-gradient(145deg, #2b3143, #131620);
            box-shadow: 0 30px 60px rgba(0,0,0,0.8), inset 0 4px 10px rgba(255,255,255,0.1), 0 0 0 2px rgba(255,255,255,0.05);
            z-index: 10;
        }

        .pointer {
            position: absolute; top: -15px; left: 50%; transform: translateX(-50%);
            width: 44px; height: 52px; z-index: 30; filter: drop-shadow(0 8px 12px rgba(0,0,0,0.6));
        }

        .wheel-hub {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 20%; height: 20%; background: linear-gradient(135deg, #ffffff, #b3b9c5);
            border-radius: 50%; z-index: 20; border: 4px solid var(--wheel-border);
            box-shadow: 0 10px 20px rgba(0,0,0,0.5), inset 0 -4px 6px rgba(0,0,0,0.2);
            display: flex; align-items: center; justify-content: center;
        }
        .wheel-hub::after { content: ''; width: 35%; height: 35%; background: var(--bg-dark); border-radius: 50%; box-shadow: inset 0 2px 4px rgba(0,0,0,0.8); }

        .wheel {
            width: 100%; height: 100%; border-radius: 50%; position: relative; overflow: hidden;
            transition: transform 12s cubic-bezier(0.1, 1, 0.15, 1); will-change: transform;
            background: conic-gradient(from -36deg, var(--slice-1) 0 72deg, var(--slice-2) 72deg 144deg, var(--slice-3) 144deg 216deg, var(--slice-4) 216deg 288deg, var(--slice-5) 288deg 360deg);
            box-shadow: inset 0 0 25px rgba(0,0,0,0.7), inset 0 0 0 2px rgba(255,255,255,0.15);
        }

        .wheel-text-wrap { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border-radius: 50%; }
        .wheel-text {
            position: absolute; top: 10%; left: 50%; transform: translateX(-50%);
            color: #ffffff; font-weight: 800; font-size: clamp(1.1rem, 5vw, 1.4rem);
            text-shadow: 0 3px 6px rgba(0,0,0,0.5); text-align: center; line-height: 1.1;
        }
        .wheel-text-small { font-size: clamp(0.9rem, 4vw, 1.1rem); color: #B3B9C5; font-weight: 600; margin-top: 4px; }

        .w-txt-1 { transform: rotate(0deg); }
        .w-txt-2 { transform: rotate(72deg); }
        .w-txt-3 { transform: rotate(144deg); }
        .w-txt-4 { transform: rotate(216deg); }
        .w-txt-5 { transform: rotate(288deg); }

        /* ----- MAIN SPIN BUTTON ----- */
        .btn-spin-wrap {
            width: 100%; padding: 4px; border-radius: 20px; transition: transform 0.2s;
            background: linear-gradient(135deg, var(--accent), var(--slice-5));
            box-shadow: 0 10px 30px rgba(0, 229, 255, 0.2); animation: float-pulse 3s infinite alternate;
        }
        .btn-spin-wrap:active { transform: scale(0.95); animation: none; }
        .btn-spin-wrap.disabled { background: #2A2F40; box-shadow: none; animation: none; transform: scale(0.98); }

        .btn-spin {
            width: 100%; background: var(--bg-dark); color: #ffffff; font-weight: 800; font-size: 1.25rem;
            padding: 18px 20px; border-radius: 16px; border: none; cursor: pointer; text-transform: uppercase;
            letter-spacing: 2px; transition: background 0.3s;
        }
        .btn-spin-wrap:not(.disabled):hover .btn-spin { background: transparent; text-shadow: 0 2px 5px rgba(0,0,0,0.5); }
        @keyframes float-pulse { 0% { transform: translateY(0); } 100% { transform: translateY(-4px); box-shadow: 0 15px 40px rgba(0, 229, 255, 0.4); } }

        /* ----- POPUP MODAL ----- */
        #modalOverlay {
            opacity: 0; visibility: hidden; transition: all 0.4s ease;
            background: rgba(4, 5, 8, 0.9); backdrop-filter: blur(5px); -webkit-backdrop-filter: blur(5px);
        }
        #modalOverlay.active { opacity: 1; visibility: visible; }
        
        #modalCard {
            transform: translateY(40px) scale(0.9); opacity: 0; transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            background: linear-gradient(180deg, #1A1F2D 0%, #131620 100%);
            border: 1px solid rgba(255,255,255,0.08); box-shadow: 0 40px 100px rgba(0,0,0,0.9);
        }
        #modalOverlay.active #modalCard { transform: translateY(0) scale(1); opacity: 1; }

        .animated-icon {
            width: 90px; height: 90px; margin: 0 auto 20px auto; transform: scale(0);
            transition: transform 0.6s cubic-bezier(0.34, 1.56, 0.64, 1); filter: drop-shadow(0 10px 15px rgba(0,0,0,0.5));
        }
        #modalOverlay.active .animated-icon { transform: scale(1); }
        .icon-glow-pulse { animation: icon-float 3s ease-in-out infinite alternate; }
        @keyframes icon-float { 0% { transform: translateY(0) scale(1); filter: drop-shadow(0 10px 15px rgba(0,0,0,0.5)); } 100% { transform: translateY(-10px) scale(1.05); filter: drop-shadow(0 20px 25px currentColor); } }

        /* =========================================
           BUTTON FX STYLES (THE LINING/SHINING)
           ========================================= */
        .modal-btn-box {
            position: relative; width: 100%; border-radius: 18px; padding: 2px;
            overflow: hidden; cursor: pointer; transition: transform 0.2s;
        }
        .modal-btn-box:active { transform: scale(0.95); }
        
        .modal-btn-inner {
            position: relative; width: 100%; padding: 18px 20px; border-radius: 16px;
            background: #131620; color: #fff; font-weight: 800; font-size: 1.1rem;
            text-transform: uppercase; letter-spacing: 1px; z-index: 10;
            display: flex; justify-content: center; align-items: center; overflow: hidden;
        }

        /* 1. NORMAL EFFECT (Moving Border & Inner Shine) */
        .effect-normal {
            background: linear-gradient(90deg, var(--prize-color), #131620, var(--prize-color));
            background-size: 200% 100%; animation: pan-border 2s linear infinite;
            box-shadow: 0 0 15px var(--prize-color-alpha);
        }
        .effect-normal .modal-btn-inner::after {
            content: ''; position: absolute; top: 0; left: -150%; width: 50%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.25), transparent);
            transform: skewX(-20deg); animation: inner-shine 3s infinite;
        }

        /* 2. JACKPOT EFFECT (Spinning Conic Border & Gold Shine) */
        .effect-jackpot {
            background: #131620; /* Base */
            box-shadow: 0 0 20px #FFD700, 0 0 40px #9D00FF;
        }
        /* The spinning lining */
        .effect-jackpot::before {
            content: ''; position: absolute; top: -50%; left: -50%; width: 200%; height: 200%;
            background: conic-gradient(transparent, #FFD700, #9D00FF, transparent 40%);
            animation: spin-conic 1.5s linear infinite; z-index: 1;
        }
        .effect-jackpot .modal-btn-inner {
            background: linear-gradient(135deg, #131620, #2A1040); /* Purple tint inside */
        }
        .effect-jackpot .modal-btn-inner::after {
            content: ''; position: absolute; top: 0; left: -150%; width: 50%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 215, 0, 0.4), transparent);
            transform: skewX(-20deg); animation: inner-shine 2s infinite;
        }

        /* 3. TRY AGAIN EFFECT (Caution Striped Lining) */
        .effect-lose {
            background: repeating-linear-gradient(45deg, #2A2F40, #2A2F40 10px, #131620 10px, #131620 20px);
            background-size: 28px 28px; animation: move-stripes 2s linear infinite;
        }
        .effect-lose .modal-btn-inner { background: #131620; color: #8B94A7; }

        /* Keyframes for button FX */
        @keyframes pan-border { 100% { background-position: 200% 0; } }
        @keyframes inner-shine { 0%, 20% { left: -150%; } 80%, 100% { left: 200%; } }
        @keyframes spin-conic { 100% { transform: rotate(360deg); } }
        @keyframes move-stripes { 100% { background-position: 28px 0; } }
    </style>
</head>
<body>

    <div class="app-wrapper">
        <div class="text-center mb-4 w-full">
            <h1 class="text-3xl sm:text-4xl font-black tracking-tight mb-2 bg-clip-text text-transparent bg-gradient-to-r from-cyan-400 to-purple-500">
                LUCKY SPIN
            </h1>
            <p class="text-[#8B94A7] text-sm font-semibold tracking-widest uppercase">Tap to claim your reward</p>
        </div>

        <div class="wheel-container">
            <div class="pointer">
                <svg viewBox="0 0 40 50" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M20 50L40 20C40 8.95431 31.0457 0 20 0C8.95431 0 0 8.95431 0 20L20 50Z" fill="url(#paint0_linear)"/>
                    <circle cx="20" cy="18" r="6" fill="#090B10"/>
                    <defs>
                        <linearGradient id="paint0_linear" x1="20" y1="0" x2="20" y2="50" gradientUnits="userSpaceOnUse">
                            <stop stop-color="#ffffff"/><stop offset="1" stop-color="#b3b9c5"/>
                        </linearGradient>
                    </defs>
                </svg>
            </div>
            <div class="wheel-hub"></div>
            <div id="wheel" class="wheel">
                <div class="wheel-text-wrap w-txt-1"><span class="wheel-text">$10</span></div>
                <div class="wheel-text-wrap w-txt-2"><span class="wheel-text">$50</span></div>
                <div class="wheel-text-wrap w-txt-3"><span class="wheel-text text-[#090B10]">$100</span></div>
                <div class="wheel-text-wrap w-txt-4"><span class="wheel-text wheel-text-small">TRY<br>AGAIN</span></div>
                <div class="wheel-text-wrap w-txt-5"><span class="wheel-text">JACKPOT</span></div>
            </div>
        </div>

        <div id="btnWrap" class="btn-spin-wrap mt-auto mb-4">
            <button id="spinBtn" class="btn-spin">SPIN NOW</button>
        </div>
    </div>

    <!-- Modal -->
    <div id="modalOverlay" class="fixed inset-0 z-50 flex items-center justify-center p-5">
        <div id="modalCard" class="w-full max-w-sm rounded-[2rem] p-8 sm:p-10 text-center relative overflow-hidden">
            <div id="modalGlow" class="absolute top-0 left-1/2 -translate-x-1/2 w-32 h-32 rounded-full blur-[60px] opacity-30"></div>
            
            <div id="modalIconContainer" class="animated-icon icon-glow-pulse relative z-10"></div>
            <h2 id="modalTitle" class="relative z-10 text-2xl font-black mb-2 text-white tracking-wide uppercase">Result</h2>
            <div id="modalReward" class="relative z-10 text-5xl sm:text-6xl font-black my-4 tracking-tighter drop-shadow-lg">$0</div>
            <p id="modalDesc" class="relative z-10 text-[#8B94A7] text-sm sm:text-base mb-8 leading-relaxed font-medium">Description text</p>
            
            <div id="modalBtnContainer" class="relative z-10 w-full"></div>
        </div>
    </div>

    <script>
        const svgCash = `<svg viewBox="0 0 24 24" fill="currentColor"><path d="M2 5v14h20V5H2zm18 12H4V7h16v10z"/><path d="M12 9c-1.65 0-3 1.35-3 3s1.35 3 3 3 3-1.35 3-3-1.35-3-3-3zm0 4c-.55 0-1-.45-1-1s.45-1 1-1 1 .45 1 1-.45 1-1 1zM7 7h2v2H7zm8 0h2v2h-2zM7 15h2v2H7zm8 0h2v2h-2z"/></svg>`;
        const svgGift = `<svg viewBox="0 0 24 24" fill="currentColor"><path d="M20 6h-2.18c.11-.31.18-.65.18-1 0-1.66-1.34-3-3-3-1.05 0-1.96.54-2.5 1.35l-.5.67-.5-.68C10.96 2.54 10.05 2 9 2 7.34 2 6 3.34 6 5c0 .35.07.69.18 1H4c-1.11 0-1.99.89-1.99 2L2 19c0 1.11.89 2 2 2h16c1.11 0 2-.89 2-2V8c0-1.11-.89-2-2-2zm-5-2c.55 0 1 .45 1 1s-.45 1-1 1h-4c0-.55.45-1 1-1 .96 0 1.83.39 2.47 1.03.64-.64 1.51-1.03 2.47-1.03-.96 0-1.83.39-2.47 1.03C13.83 4.39 14.7 4 15 4zM9 4c.55 0 1 .45 1 1s-.45 1-1 1H5c0-.55.45-1 1-1 .96 0 1.83.39 2.47 1.03C8.83 4.39 7.96 4 9 4zm11 15H4v-2h16v2zm0-5H4V8h5.08L7 10.83 8.62 12 11 8.76 12 7.4l1 1.36L15.38 12 17 10.83 14.92 8H20v6z"/></svg>`;
        const svgTrophy = `<svg viewBox="0 0 24 24" fill="currentColor"><path d="M19 5h-2V3H7v2H5c-1.1 0-2 .9-2 2v1c0 2.55 1.92 4.63 4.39 4.94A5.01 5.01 0 0011 15.9V19H7v2h10v-2h-4v-3.1a5.01 5.01 0 003.61-2.96C19.08 12.63 21 10.55 21 8V7c0-1.1-.9-2-2-2zM5 8V7h2v3.82C5.84 10.4 5 9.3 5 8zm14 0c0 1.3-.84 2.4-2 2.82V7h2v1z"/></svg>`;
        const svgBroken = `<svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-2h2v2zm0-4h-2V7h2v6z"/></svg>`;
        const svgCrown = `<svg viewBox="0 0 24 24" fill="currentColor"><path d="M5 16h14l-1.5-9L15 11l-3-6-3 6-2.5-4L5 16zm14 2H5v2h14v-2z"/></svg>`;

        const segments = [
            { text: "$10", color: "#FF2E63", type: "prize", svg: svgCash, link: "https://www.profitablecpmratenetwork.com/ccnwrss06?key=062f07b37c301aed99340f16c624cb48" },
            { text: "$50", color: "#00D2FC", type: "prize", svg: svgGift, link: "https://www.profitablecpmratenetwork.com/ccnwrss06?key=062f07b37c301aed99340f16c624cb48" },
            { text: "$100", color: "#FFD700", type: "prize", svg: svgTrophy, link: "https://www.profitablecpmratenetwork.com/ccnwrss06?key=062f07b37c301aed99340f16c624cb48" },
            { text: "TRY AGAIN", color: "#2A2F40", type: "lose", svg: svgBroken, link: "" },
            { text: "JACKPOT", color: "#9D00FF", type: "prize", svg: svgCrown, link: "https://www.profitablecpmratenetwork.com/ccnwrss06?key=062f07b37c301aed99340f16c624cb48" }
        ];

        const wheel = document.getElementById('wheel');
        const spinBtn = document.getElementById('spinBtn');
        const btnWrap = document.getElementById('btnWrap');
        const modalOverlay = document.getElementById('modalOverlay');
        const modalIconContainer = document.getElementById('modalIconContainer');
        const modalTitle = document.getElementById('modalTitle');
        const modalReward = document.getElementById('modalReward');
        const modalDesc = document.getElementById('modalDesc');
        const modalBtnContainer = document.getElementById('modalBtnContainer');
        const modalGlow = document.getElementById('modalGlow');

        let currentRotation = 0;
        let isSpinning = false;

        spinBtn.addEventListener('click', () => {
            if (isSpinning) return;
            isSpinning = true;
            btnWrap.classList.add('disabled');
            spinBtn.innerText = "SPINNING...";
            spinBtn.disabled = true;

            const winningIndex = Math.floor(Math.random() * segments.length);
            const targetAngle = (360 - (winningIndex * 72)) % 360;
            const offset = Math.floor(Math.random() * 50) - 25; 
            
            const currentMod = currentRotation % 360;
            let rotationNeeded = (targetAngle + offset) - currentMod;
            if (rotationNeeded < 0) rotationNeeded += 360;

            const baseSpins = 360 * 15; 
            currentRotation += baseSpins + rotationNeeded;

            wheel.style.transform = `rotate(${currentRotation}deg)`;

            wheel.ontransitionend = () => {
                isSpinning = false;
                btnWrap.classList.remove('disabled');
                spinBtn.innerText = "SPIN AGAIN";
                spinBtn.disabled = false;
                wheel.ontransitionend = null;
                showResult(segments[winningIndex]);
            };
        });

        function showResult(prize) {
            modalIconContainer.innerHTML = prize.svg;
            modalIconContainer.style.color = prize.type === "lose" ? "#8B94A7" : prize.color;
            modalGlow.style.backgroundColor = prize.color;
            
            modalReward.innerText = prize.text === "TRY AGAIN" ? "OOPS!" : prize.text;
            modalReward.style.color = prize.type === "lose" ? "#8B94A7" : prize.color;
            
            modalBtnContainer.innerHTML = ''; 

            // Create Dynamic FX Button Structure
            const btnBox = document.createElement('div');
            const btnInner = document.createElement('div');
            btnBox.className = "modal-btn-box";
            btnInner.className = "modal-btn-inner";

            if (prize.type === 'lose') {
                modalTitle.innerText = "NO LUCK";
                modalTitle.style.color = "#FFFFFF";
                modalDesc.innerText = "You missed it this time! Take a deep breath and give it another try.";
                
                btnBox.classList.add('effect-lose');
                btnInner.innerText = "TRY AGAIN";
                
                btnBox.onclick = () => modalOverlay.classList.remove('active');

            } else {
                modalTitle.innerText = prize.text === "JACKPOT" ? "MEGA WIN!" : "YOU WON!";
                modalTitle.style.color = "#FFFFFF";
                modalDesc.innerText = "Your premium reward has been unlocked. Click below to claim it immediately.";
                
                btnInner.innerText = "CLAIM IT NOW";
                
                if (prize.text === "JACKPOT") {
                    btnBox.classList.add('effect-jackpot');
                } else {
                    btnBox.classList.add('effect-normal');
                    // Pass dynamic color to CSS variables for exact color glow
                    btnBox.style.setProperty('--prize-color', prize.color);
                    btnBox.style.setProperty('--prize-color-alpha', prize.color + '66'); // adding hex opacity
                }
                
                btnBox.onclick = () => {
                    window.open(prize.link, "_blank"); 
                    modalOverlay.classList.remove('active');
                };
                
                triggerConfetti(prize.text === "JACKPOT", prize.color);
            }

            btnBox.appendChild(btnInner);
            modalBtnContainer.appendChild(btnBox);

            modalOverlay.classList.add('active');
        }

        function triggerConfetti(isJackpot, color) {
            const count = isJackpot ? 300 : 150;
            confetti({ particleCount: count, spread: 100, origin: { y: 0.6 }, colors: [color, '#ffffff', '#FFD700'], disableForReducedMotion: true });
        }
    </script>
</body>
</html>
